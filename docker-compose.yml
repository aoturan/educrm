services:
  api:
    build:
      context: ./src
      dockerfile: Dockerfile
    image: educrm-api
    container_name: educrm_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: "Host=host.docker.internal;Port=5432;Database=educrm;Username=educrm;Password=educrm_dev_password;Include Error Detail=true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
